# Wokwi simulation config — used by the Wokwi for VS Code extension.
# Build the firmware first:  pio run -e wokwi
# Then run "Wokwi: Start Simulator" with this file open.
[wokwi]
version = 1
firmware = ".pio/build/wokwi/firmware.bin"
elf = ".pio/build/wokwi/firmware.elf"

# DMX output (GPIO17) is wired to the logic analyzer in diagram.json.
# Captured frames are written to this VCD — open it to inspect BREAK / MAB /
# start code / 512 slots and verify the ~40 Hz failsafe refresh timing.
[[net.forward]]
# Forward the device web UI (port 80) to localhost:8180 so you can open the
# LumiGate dashboard in a browser against the simulated board.
from = "localhost:8180"
to = "target:80"
