<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LuxDMX — Updating</title>
<link rel="icon" type="image/png" href="/favicon.png?v=__FWVER__">
<link rel="stylesheet" href="/bootstrap.min.css?v=__FWVER__">
<style>
body { background:#0d1117; display:flex; align-items:center; justify-content:center; min-height:100vh; }
.box { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:2.5rem; text-align:center; width:min(420px,92vw); }
/* Brand spinner: DMX-fader equaliser bars bouncing through the four brand colours. */
@keyframes fade-bar { 0%,100% { transform:scaleY(.3); } 50% { transform:scaleY(1); } }
.spinner { display:inline-flex; align-items:flex-end; gap:5px; height:2.5rem; margin-bottom:1.25rem; }
.spinner i { width:8px; height:100%; border-radius:3px; transform-origin:bottom; animation:fade-bar 1s ease-in-out infinite; }
.spinner i:nth-child(1){ background:#23e6f7; animation-delay:0s; }
.spinner i:nth-child(2){ background:#45d85c; animation-delay:.12s; }
.spinner i:nth-child(3){ background:#ffaa1c; animation-delay:.24s; }
.spinner i:nth-child(4){ background:#f33abc; animation-delay:.36s; }
.spinner i:nth-child(5){ background:#23e6f7; animation-delay:.48s; }
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="spin"><i></i><i></i><i></i><i></i><i></i></div>
  <div class="fw-bold fs-5 mb-2" id="title">Starting update&hellip;</div>
  <div class="text-secondary small" id="sub">Fetching the new firmware from LuxDMX.org.</div>
  <div id="barwrap" style="display:none;height:6px;background:#21262d;border-radius:3px;overflow:hidden;margin-top:1.4rem">
    <div id="bar" style="height:100%;width:0%;background:linear-gradient(90deg,#23e6f7,#f33abc);transition:width .3s linear"></div>
  </div>
</div>
<script>
// The version this page was built as, baked in at build time. This page is served
// by the firmware running RIGHT NOW (the one being replaced), so FROM is the
// pre-update version. The update is only really done once the device comes back
// reporting a DIFFERENT version — that, not "the server answered", is the signal
// to reload. The old firmware keeps answering HTTP while it downloads, so a plain
// "first 200 wins" reload would bounce you onto the stale pre-update page.
var FROM = "__FWVER__";
var titleEl = document.getElementById('title');
var subEl   = document.getElementById('sub');
var barWrap = document.getElementById('barwrap');
var barEl   = document.getElementById('bar');
function show(title, sub, pct) {
  titleEl.textContent = title;
  subEl.innerHTML = sub;
  if (pct == null) { barWrap.style.display = 'none'; }
  else { barWrap.style.display = 'block'; barEl.style.width = Math.max(0, Math.min(100, pct)) + '%'; }
}
var lastPct = 0, wrote = false, start = Date.now();
function again() {
  if (Date.now() - start > 150000) { location.replace('/'); }   // safety net
  else { setTimeout(tick, 1000); }
}
function tick() {
  fetch('/version.json', { cache: 'no-store' })
    .then(function(r){ if (!r.ok) throw 0; return r.json(); })
    .then(function(d){
      if (d && d.current && d.current !== FROM) {        // device reports the NEW version -> done
        show('Up to date', 'Reloading&hellip;', 100);
        location.replace('/');
        return;
      }
      // Still the old firmware: ask it what the install is actually doing.
      // (Download and flash stream together on the ESP, so phase 1 is both; the
      //  device stays reachable because AsyncTCP runs while the update blocks loop.)
      return fetch('/ota/status', { cache: 'no-store' })
        .then(function(r){ return r.json(); })
        .then(function(s){
          lastPct = s.pct || 0;
          if (s.phase === 3)      show('Update failed', 'The device keeps its current firmware and will reboot.', null);
          else if (s.phase === 2) { wrote = true; show('Flashing firmware&hellip;', 'Verifying and finishing the new image.', 100); }
          else if (s.phase === 1) show('Downloading firmware&hellip;', 'Streaming from LuxDMX.org and writing to flash.', lastPct);
          else                    show('Starting update&hellip;', 'Fetching the new firmware from LuxDMX.org.', null);
          again();
        })
        .catch(function(){ again(); });   // status momentarily unavailable -> hold the last view
    })
    .catch(function(){
      // Device unreachable -> it's rebooting. Only say so once the write finished;
      // before that it's just busy flashing and not yet answering.
      if (wrote || lastPct >= 99) show('Rebooting&hellip;', 'Waiting for the device to come back online.', 100);
      else show('Downloading firmware&hellip;', 'Streaming from LuxDMX.org and writing to flash.', lastPct);
      again();
    });
}
setTimeout(tick, 1500);
</script>
</body>
</html>
