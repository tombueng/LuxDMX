<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LumiGate – Config</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono text-sm">
<nav class="bg-gray-900 border-b border-gray-800 px-4 py-3 flex flex-wrap items-center gap-4">
  <img src="/logo.png" alt="LumiGate" class="h-8 w-8 rounded">
  <a href="/" class="text-gray-400 hover:text-cyan-400">Status</a>
  <a href="/config" class="text-cyan-400 border-b border-cyan-400">Config</a>
  <a href="/reset"  class="text-gray-400 hover:text-cyan-400">Reset</a>
</nav>
<main class="p-4 max-w-md mx-auto">
<div class="bg-gray-800 rounded-lg p-5 space-y-4">
<h2 class="text-cyan-400 font-bold">Configuration</h2>
<form method="POST" action="/config" class="space-y-3">
<label class="block">
  <span class="text-xs text-gray-400">Art-Net Universe (0–15)</span>
  <input name="universe" type="number" min="0" max="15" value="{{UNIVERSE}}"
    class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-cyan-500">
</label>
<label class="block">
  <span class="text-xs text-gray-400">Hostname (without .local)</span>
  <input name="hostname" type="text" maxlength="32" value="{{HOSTNAME}}"
    class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-cyan-500">
</label>
<label class="block">
  <span class="text-xs text-gray-400">OTA Password</span>
  <input name="otapw" type="password" maxlength="32" value="{{OTAPW}}"
    class="mt-1 w-full bg-gray-900 border border-gray-700 rounded px-3 py-2 text-gray-100 focus:outline-none focus:border-cyan-500">
</label>
<button type="submit"
  class="w-full py-2 rounded bg-cyan-500 hover:bg-cyan-400 text-gray-950 font-bold">
  Save &amp; Restart
</button>
</form>
</div>
<footer class="text-center text-gray-700 text-xs py-4 mt-6 border-t border-gray-800">
  &copy; 2026 <a href="https://github.com/tombueng" class="hover:text-gray-400 underline">tombueng</a>
  &nbsp;&mdash;&nbsp;
  <a href="https://github.com/tombueng/LumiGate" class="hover:text-gray-400 underline">LumiGate on GitHub</a>
  &nbsp;&mdash;&nbsp;MIT License
</footer>
</main></body></html>
