<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LuxDMX Reset WiFi</title>
<link rel="icon" type="image/png" href="/favicon.png?v=__FWVER__">
<link rel="stylesheet" href="/bootstrap.min.css?v=__FWVER__">
<style>
:root { --gh-bg:#0d1117; --gh-surface:#161b22; --gh-border:#30363d; --gh-text:#c9d1d9; --gh-muted:#8b949e;
  --lux-cyan:#23e6f7; --lux-magenta:#f33abc; --lux-amber:#ffaa1c; --lux-green:#45d85c; --lux-ink:#06141a; }
[data-bs-theme="dark"] {
  --bs-body-bg: var(--gh-bg); --bs-body-color: var(--gh-text);
  --bs-card-bg: var(--gh-surface); --bs-card-border-color: var(--gh-border);
  --bs-primary:#23e6f7; --bs-primary-rgb:35,230,247;
  --bs-success:#45d85c; --bs-success-rgb:69,216,92;
  --bs-warning:#ffaa1c; --bs-warning-rgb:255,170,28;
  --bs-danger:#f33abc; --bs-danger-rgb:243,58,188;
}
.btn-primary{--bs-btn-bg:#23e6f7;--bs-btn-border-color:#23e6f7;--bs-btn-color:#06141a;--bs-btn-hover-bg:#5cedfb;--bs-btn-hover-border-color:#5cedfb;--bs-btn-hover-color:#06141a;--bs-btn-active-bg:#15bccc;--bs-btn-active-border-color:#15bccc;--bs-btn-active-color:#06141a;}
.btn-danger{--bs-btn-bg:#f33abc;--bs-btn-border-color:#f33abc;--bs-btn-color:#06141a;--bs-btn-hover-bg:#ff5bcd;--bs-btn-hover-border-color:#ff5bcd;--bs-btn-hover-color:#06141a;--bs-btn-active-bg:#d11d9c;--bs-btn-active-border-color:#d11d9c;--bs-btn-active-color:#06141a;}
body { background: var(--gh-bg); }
.site-nav {
  background: var(--gh-surface); border-bottom: 1px solid var(--gh-border);
  padding: 0.6rem 1rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
.brand img { height: 48px; }
.brand-text { font-size: 1.2rem; font-weight: 700; color: #fff; }
.nav-links { margin-left: auto; display: flex; gap: 0.4rem; }
.card { background: var(--gh-surface); border-color: var(--gh-border); }
footer { border-color: var(--gh-border) !important; color: var(--gh-muted); font-size: 0.77rem; }
footer a { color: var(--gh-muted); text-decoration: none; }
footer a:hover { color: var(--gh-text); }
</style>
</head>
<body>

<nav class="site-nav">
  <a class="brand" href="/">
    <img src="/logo.png?v=__FWVER__" alt="LuxDMX">
    <span class="brand-text">LuxDMX</span>
  </a>
  <div class="nav-links">
    <a href="/" class="btn btn-outline-secondary btn-sm">Status</a>
    <a href="/config" class="btn btn-outline-secondary btn-sm">Settings</a>
    <a href="/reset" class="btn btn-primary btn-sm">Reset WiFi</a>
  </div>
</nav>

<div class="container py-5" style="max-width:460px">
  <div class="card border-danger">
    <div class="card-body text-center py-5">
      <div class="mb-3" style="font-size:3rem;line-height:1">&#9888;</div>
      <h5 class="fw-bold mb-2">Reset WiFi credentials</h5>
      <p class="text-secondary mb-4">
        Erases the stored WiFi password and reboots into the setup access point
        <strong>DMX-Gateway</strong>. Art-Net universe and other settings are preserved.
      </p>
      <form method="POST" action="/reset">
        <button type="submit" class="btn btn-danger px-5">Reset &amp; Reboot</button>
      </form>
    </div>
  </div>
</div>

<footer class="text-center py-3 border-top">
  &copy; 2026 <a href="https://github.com/tombueng">tombueng</a>
  &nbsp;&middot;&nbsp; <a href="https://github.com/tombueng/LuxDMX">LuxDMX</a>
  &nbsp;&middot;&nbsp; MIT License
</footer>

</body>
</html>
