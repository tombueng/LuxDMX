; LumiGate RDM fixture simulator - standalone firmware for a 2nd ESP32-S3.
; Self-contained: it does NOT share the parent project's platformio.ini. Build
; and flash from this folder:  pio run -e rdm_sim -t upload
;
; Same pinned pioarduino platform (arduino-esp32 v3 / IDF 5) as the main firmware,
; because esp_dmx needs the IDF5 build patch (extra_scripts.py) and the S3 needs
; the brownout-detector disabled or it boot-loops.

[env:rdm_sim]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino
board     = esp32-s3-devkitc-1

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

upload_speed = 921600

extra_scripts = extra_scripts.py

lib_deps =
    someweisguy/esp_dmx @ ^4.1.0
    adafruit/Adafruit NeoPixel @ ^1.12.3

; Disable the IDF brownout detector - same S3 boot-loop fix the main firmware
; uses. On arduino-esp32 v3 / IDF5 the BOD is armed in IDF startup before setup()
; runs, so it must be turned off at the sdkconfig level. Forces an Arduino source
; build (slower first compile).
custom_sdkconfig =
    CONFIG_ESP_BROWNOUT_DET=n

; Pin overrides (optional) - defaults match src/main.cpp:
;   -DSIM_TX_PIN=17 -DSIM_RX_PIN=18 -DSIM_EN_PIN=8 -DRGB_LED_PIN=48
; Some S3 boards put the onboard WS2812 on GPIO38 - override RGB_LED_PIN then.
build_flags =
