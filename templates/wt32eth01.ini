# WT32-ETH01 (classic ESP32 + LAN8720 RMII Ethernet). Mirrors the wt32eth01 build.
# Compile-time USE_ETH_RMII stays in platformio.ini; values live here.
extends=_base

ledpin=2
ledtype=1

# DMX moved off GPIO16/17 (taken by the LAN8720 PHY)
o0_tx=4
o0_rx=5

# Wired Ethernet is this board's default; PHY = LAN8720 (RMII)
useeth=1
wiredphy=1
rmiimdc=23
rmiimdio=18
rmiipwr=16

# OLED header
dispsda=14
dispscl=15
