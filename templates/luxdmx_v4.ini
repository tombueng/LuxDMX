# LuxDMX v4 board (ESP32-S3 + onboard W5500). Mirrors the luxdmx_v4 build_flags.
# Compile-time flags stay in platformio.ini (USE_ETH_SPI, board, custom_sdkconfig);
# this template only carries the runtime default VALUES.
extends=_base

# 5-LED status panel (ledpin stays the _base GPIO2 default, unused at ledtype 3)
ledtype=3
ledr=1
ledg=2
ledy=6
ledb=7
ledw=15

# Two isolated DMX universes
o0_tx=17
o0_rx=18
o0_rts=8
o1_en=1
o1_tx=16
o1_rx=21
o1_rts=47

# W5500 SPI pins (module is opt-in at runtime; WiFi is the default)
ethcs=10
ethsck=12
ethmosi=11
ethmiso=13
ethint=14
ethrst=9

# Display header pre-wired (panel stays off until enabled)
dispsda=4
dispscl=5
dispsck=39
dispmosi=40
dispcs=41
dispdc=42
disprst=38
