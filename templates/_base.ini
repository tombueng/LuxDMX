# Base template — global defaults shared by every board, applied before the
# board template. Only values that differ from the schema's NEUTRAL (a pin -> -1,
# an int/enum -> its min, bool -> false, string -> "") need listing here, so this
# mirrors main.cpp's old global DEF_* fallbacks (the per-board -D overrides live
# in each board template). Keys are exactly the schema keys (see config_schema.cpp);
# per-output keys are o<i>_<suffix>. Lines are key=value; '#' is a comment.

# Identity
hostname=dmx-gateway
otapw=dmxota
protocol=2

# Status LED — classic default GPIO2 plain (boards override)
ledpin=2
ledtype=1

# Display I2C default pins (boards override)
dispsda=21
dispscl=22

# W5500 SPI default pins (classic-ESP32 VSPI); the v4 board overrides these
ethcs=5
ethsck=18
ethmosi=23
ethmiso=19
ethint=4
ethrst=25
ethfreq=20

# RMII (LAN8720) defaults; only the WT32-ETH01 board actually uses RMII
rmiiaddr=1
rmiimdc=23
rmiimdio=18
rmiipwr=16

# Network
subnet=255.255.255.0

# Output 0 on by default at the classic DMX pins; output 1 present but off
o0_en=1
o0_tx=17
o0_rx=16
o1_uni=1
o1_port=2
