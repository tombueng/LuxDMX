# Base template — universal policy defaults, applied before any board template.
# Only values that differ from the schema's neutral need listing here.
# Keys are exactly the schema keys (see src/config/config_schema.cpp);
# per-output keys are o<i>_<suffix>. Lines are key=value; '#' is a comment.

subnet=255.255.255.0

# Output 0 on by default, output 1 present but off until a board enables it.
o0_en=1
o1_uni=1
o1_port=2
