name: Build & Release

on:
  push:
    branches: [master]
    # Only rebuild/release when something that actually ends up in the firmware
    # changes. Commits to hardware/, docs/, web/, README, etc. no longer bump the
    # version, so devices on auto-update stop getting spammed with identical builds.
    paths:
      - 'src/**'
      - 'platformio.ini'
      - 'extra_scripts.py'
      - '.github/workflows/build.yml'
  pull_request:
    # Build-only verification on PRs (no release — see the `if:` guards on the
    # release steps). Lets a v3/toolchain change be proven green before it ever
    # touches the rolling `latest` release that devices auto-update from.
    branches: [master]
    paths:
      - 'src/**'
      - 'platformio.ini'
      - 'extra_scripts.py'
      - '.github/workflows/build.yml'
  workflow_dispatch:   # allow a manual rebuild/release from the Actions tab

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so we can diff against the previous version

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          # pioarduino 55.03.39's Xtensa toolchain archive carries a stray top-level
          # package.json that aborts idf_tools.py (do_strip_container_dirs:
          # "expected 1 entry, got ['package.json', ...]"), leaving the compiler
          # uninstalled. Patch the install-time idf_tools.py to ignore that file.
          # tool-esp_install is downloaded *before* it runs the strip, so if the
          # first build aborts on it we patch the now-present file and retry.
          patch_idf_tools() {
            while IFS= read -r f; do
              sed -i "s|^\([[:space:]]*\)contents = os\.listdir(base_path)\$|\1contents = [c for c in os.listdir(base_path) if c != 'package.json']|" "$f"
              echo "patched $f"
            done < <(find ~/.platformio -path '*tool-esp_install*idf_tools.py' 2>/dev/null)
          }
          patch_idf_tools   # no-op if tool-esp_install isn't downloaded yet

          pio run -e esp32dev || { patch_idf_tools; pio run -e esp32dev; }
          cp .pio/build/esp32dev/firmware.bin   firmware.bin
          cp .pio/build/esp32dev/bootloader.bin bootloader.bin
          cp .pio/build/esp32dev/partitions.bin partitions.bin

          pio run -e esp32s3dev
          cp .pio/build/esp32s3dev/firmware.bin   firmware-esp32s3.bin
          cp .pio/build/esp32s3dev/bootloader.bin bootloader-esp32s3.bin
          cp .pio/build/esp32s3dev/partitions.bin partitions-esp32s3.bin

          pio run -e wt32eth01
          cp .pio/build/wt32eth01/firmware.bin   firmware-wt32eth01.bin
          cp .pio/build/wt32eth01/bootloader.bin bootloader-wt32eth01.bin
          cp .pio/build/wt32eth01/partitions.bin partitions-wt32eth01.bin

          BOOT_APP0=$(find ~/.platformio/packages -name "boot_app0.bin" | head -1)
          cp "$BOOT_APP0" boot_app0.bin
          echo "1.0.${{ github.run_number }}" > version.txt
        env:
          LUXDMX_VERSION: "1.0.${{ github.run_number }}"

      - name: Build per-version changelog
        run: |
          # Commits introduced since the previous version tag (meaningful only)
          PREV_TAG=$(git tag -l 'v1.0.*' | sort -V | tail -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            echo "Diffing against $PREV_TAG"
          else
            RANGE="HEAD"
          fi
          git log --pretty=format:"- %s" --no-merges $RANGE \
            | grep -viE "^- (merge|wip\b|fixup|amend|typo|formatting|whitespace)" \
            > changes.txt || true
          # Fallback if empty (e.g. first release or only filtered commits)
          if [ ! -s changes.txt ]; then
            git log --pretty=format:"- %s" --no-merges -10 > changes.txt
          fi
          echo "----- changes.txt -----"; cat changes.txt

      - name: Compose release notes
        run: |
          {
            echo "## What's new in v1.0.${{ github.run_number }}"
            echo ""
            cat changes.txt
            echo ""
            echo ""
            echo "## Flash files"
            echo "- **ESP32** (WROOM-32, WROVER): \`firmware.bin\` + \`flash.ps1\`"
            echo "- **ESP32-S3** (DevKitC-1): \`firmware-esp32s3.bin\`"
            echo "- **WT32-ETH01** (Ethernet): \`firmware-wt32eth01.bin\`"
            echo ""
            echo "_Build 1.0.${{ github.run_number }} from ${{ github.sha }}_"
          } > notes.md

      - name: Publish preserved versioned release
        if: github.ref == 'refs/heads/master'   # never release from a PR/branch build
        run: |
          gh release create "v1.0.${{ github.run_number }}" \
            --title "v1.0.${{ github.run_number }} ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes-file notes.md \
            --target "${{ github.sha }}" \
            --prerelease \
            firmware.bin bootloader.bin partitions.bin boot_app0.bin \
            firmware-esp32s3.bin bootloader-esp32s3.bin partitions-esp32s3.bin \
            firmware-wt32eth01.bin bootloader-wt32eth01.bin partitions-wt32eth01.bin \
            version.txt changes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update rolling 'latest' release
        if: github.ref == 'refs/heads/master'   # never touch the OTA 'latest' from a PR/branch build
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Latest → v1.0.${{ github.run_number }} ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes-file notes.md \
            --target "${{ github.sha }}" \
            --prerelease \
            firmware.bin bootloader.bin partitions.bin boot_app0.bin \
            firmware-esp32s3.bin bootloader-esp32s3.bin partitions-esp32s3.bin \
            firmware-wt32eth01.bin bootloader-wt32eth01.bin partitions-wt32eth01.bin \
            version.txt changes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
