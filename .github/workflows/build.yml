name: Build & Release

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: |
          pio run -e esp32dev
          cp .pio/build/esp32dev/firmware.bin   firmware.bin
          cp .pio/build/esp32dev/bootloader.bin bootloader.bin
          cp .pio/build/esp32dev/partitions.bin partitions.bin

          pio run -e esp32s3dev
          cp .pio/build/esp32s3dev/firmware.bin   firmware-esp32s3.bin
          cp .pio/build/esp32s3dev/bootloader.bin bootloader-esp32s3.bin
          cp .pio/build/esp32s3dev/partitions.bin partitions-esp32s3.bin

          pio run -e wt32eth01
          cp .pio/build/wt32eth01/firmware.bin   firmware-wt32eth01.bin
          cp .pio/build/wt32eth01/bootloader.bin bootloader-wt32eth01.bin
          cp .pio/build/wt32eth01/partitions.bin partitions-wt32eth01.bin

          BOOT_APP0=$(find ~/.platformio/packages -name "boot_app0.bin" | head -1)
          cp "$BOOT_APP0" boot_app0.bin
          echo "1.0.${{ github.run_number }}" > version.txt
          git log --pretty=format:"• %s" -20 --no-merges > changes.txt
        env:
          LUMIGATE_VERSION: "1.0.${{ github.run_number }}"

      - name: Delete existing latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish rolling latest release
        run: |
          {
            echo "## Changes"
            echo ""
            cat changes.txt
            echo ""
            echo ""
            echo "## Flash files"
            echo "- **ESP32** (WROOM-32, WROVER): \`firmware.bin\` + \`flash.ps1\`"
            echo "- **ESP32-S3** (DevKitC-1): \`firmware-esp32s3.bin\`"
            echo "- **WT32-ETH01** (Ethernet): \`firmware-wt32eth01.bin\`"
            echo ""
            echo "_Build 1.0.${{ github.run_number }} from ${{ github.sha }}_"
          } > notes.md
          gh release create latest \
            --title "v1.0.${{ github.run_number }} ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes-file notes.md \
            --prerelease \
            firmware.bin bootloader.bin partitions.bin boot_app0.bin \
            firmware-esp32s3.bin bootloader-esp32s3.bin partitions-esp32s3.bin \
            firmware-wt32eth01.bin bootloader-wt32eth01.bin partitions-wt32eth01.bin \
            version.txt changes.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
