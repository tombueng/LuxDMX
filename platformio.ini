; LumiGate — Art-Net / sACN → DMX Gateway
; Supports ESP32 (original), ESP32-S3, WT32-ETH01 (RMII Ethernet) and the
; LumiGate v3 board (ESP32-S3 + W5500 SPI-Ethernet + 5 status LEDs).

; ── Shared settings ─────────────────────────────────────────────────────────
; arduino-esp32 v3 (IDF 5.x) via the pioarduino platform fork. v3 is required for
; the W5500 SPI-Ethernet path (ETH_PHY_W5500 — registers the W5500 as an lwIP
; netif, so AsyncWebServer / Art-Net / OTA keep working unchanged). The original
; PlatformIO espressif32 platform stalled at arduino-esp32 v2.x, which has no
; W5500 ETH support. Pinned for reproducible CI; bump the tag to upgrade.
[env]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Upload — boards without reliable auto-reset: hold BOOT while plugging USB
upload_port  = COM3
upload_flags = --before=no_reset

extra_scripts = extra_scripts.py

lib_deps =
    someweisguy/esp_dmx @ ^4.1.0
    rstephan/ArtnetWifi  @ ^1.5.0
    tzapu/WiFiManager    @ ^2.0.17
    adafruit/Adafruit NeoPixel @ ^1.12.3
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/Adafruit SSD1351 library @ ^1.3.2
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git

board_build.partitions = min_spiffs.csv

; AsyncTCP hardening — larger task stack + queue so the web/WebSocket server
; never starves or overflows under sustained connection churn (it must stay
; reachable on stage). Pin it to core 1 alongside loop, away from the WiFi
; stack on core 0.
build_flags =
    -DCONFIG_ASYNC_TCP_STACK_SIZE=16384
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=128
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_PRIORITY=10

; ── ESP32 (original / WROOM-32 / WROVER) ────────────────────────────────────
; Default LED: GPIO2 plain, type 1 (plain GPIO active-high)
[env:esp32dev]
board        = esp32dev
upload_speed = 460800
build_flags  = ${env.build_flags} -DDEF_LED_PIN=2 -DDEF_LED_TYPE=1 -DDEF_DISP_SDA=21 -DDEF_DISP_SCL=22

; ── ESP32 (classic) + W5500 SPI-Ethernet (external module) ──────────────────
; Original ESP32-WROOM with a W5500 module on VSPI (= SPI3_HOST, the firmware
; default). Validates the USE_ETH_SPI runtime WiFi/Ethernet switch on the classic
; ESP32, not just the v3 S3 board. Dual-stack: WiFi + W5500 in one image, chosen
; at runtime in /config (cfg.useEthernet). Module wiring:
;   CS=5  SCK=18  MOSI=23  MISO=19  INT=4  RST=25  (VSPI defaults + INT/RST)
[env:esp32dev_w5500]
board        = esp32dev
upload_speed = 460800
build_flags  =
    ${env.build_flags}
    -DDEF_LED_PIN=2
    -DDEF_LED_TYPE=1
    -DDEF_DISP_SDA=21
    -DDEF_DISP_SCL=22
    -DUSE_ETH_SPI
    -DETH_W5500_SCK=18
    -DETH_W5500_MOSI=23
    -DETH_W5500_MISO=19
    -DETH_W5500_CS=5
    -DETH_W5500_IRQ=4
    -DETH_W5500_RST=25

; ── ESP32-S3 (DevKitC-1) ────────────────────────────────────────────────────
; DevKitC-1 built-in LED: GPIO48 WS2812 RGB, type 2
; Other S3 boards (FeatherS3, XIAO): plain LED on GPIO21 — change DEF_LED_PIN
[env:esp32s3dev]
board        = esp32-s3-devkitc-1
upload_speed = 921600
; Disable the IDF brownout detector — same S3 boot-loop fix as lumigate_v3. On
; arduino-esp32 v3 / IDF 5 the BOD is armed in IDF startup (do_core_init →
; esp_brownout_init) BEFORE setup() runs, so the runtime RTC_CNTL_BROWN_OUT_REG
; write is too late on the S3 and the board boot-loops. Required before v3 ships
; to esp32s3dev OTA users. NOTE: custom_sdkconfig forces an Arduino source build.
custom_sdkconfig =
    CONFIG_ESP_BROWNOUT_DET=n
build_flags  = ${env.build_flags} -DDEF_LED_PIN=48 -DDEF_LED_TYPE=2 -DDEF_DISP_SDA=8 -DDEF_DISP_SCL=9

; ── ESP32-S3 fast local-dev build ───────────────────────────────────────────
; Same board/pins as esp32s3dev, but WITHOUT custom_sdkconfig — so pioarduino
; uses its PRECOMPILED Arduino libraries instead of rebuilding the core from
; source. No source build, no idf_tools toolchain step → fast iterate-and-flash.
; Trade-off: the IDF brownout detector stays ON (the default). That is fine on
; bench USB power; on a power-marginal board it can boot-loop, so ship field
; units / releases with the source-built esp32s3dev (BOD-off) instead.
; NOTE: don't alternate esp32s3dev and this env in one session — the source
; build rewrites the shared S3 libs, so switching back forces a rebuild. Pick
; one per dev session.
[env:esp32s3dev_fast]
board        = esp32-s3-devkitc-1
upload_speed = 921600
build_flags  = ${env.build_flags} -DDEF_LED_PIN=48 -DDEF_LED_TYPE=2 -DDEF_DISP_SDA=8 -DDEF_DISP_SCL=9

; ── WT32-ETH01 (RMII Ethernet + WiFi, runtime-selectable — issue #14) ─────────
; LAN8720 PHY on RMII — GPIO16=PHY power, GPIO0=CLK, GPIO18=MDIO, GPIO23=MDC
; DMX moved to GPIO4(TX)/GPIO5(RX) because GPIO16 is taken by LAN8720.
; USE_ETH_RMII compiles BOTH the wired (LAN8720) and WiFi stacks into one build;
; the active interface is chosen at runtime in /config (cfg.useEthernet). Wired
; Ethernet stays the DEFAULT here (this board has historically been wired-only),
; with WiFi STA/AP and an Ethernet→AP no-link fallback available as options.
[env:wt32eth01]
board        = wt32-eth01
upload_speed = 460800
build_flags  =
    ${env.build_flags}
    -DDEF_LED_PIN=2
    -DDEF_LED_TYPE=1
    -DDEF_DMX_TX_PIN=4
    -DDEF_DMX_RX_PIN=5
    -DDEF_DISP_SDA=14
    -DDEF_DISP_SCL=15
    -DUSE_ETH_RMII

; ── Wokwi simulation (ESP32-S3, matches v3 hardware) ────────────────────────
; SIM_WIFI joins Wokwi's open "Wokwi-GUEST" AP directly, bypassing the
; WiFiManager config portal (unreachable from the simulator host).
; Build with:  pio run -e wokwi   then launch the Wokwi VS Code extension.
[env:wokwi]
board        = esp32-s3-devkitc-1
upload_speed = 921600
build_flags  = ${env.build_flags} -DDEF_LED_PIN=48 -DDEF_LED_TYPE=2 -DSIM_WIFI -DSIM_ARTNET -DDEF_DISP_TYPE=1 -DDEF_DISP_SDA=8 -DDEF_DISP_SCL=9

; ── LumiGate v3 board (ESP32-S3-WROOM-1-N8 + W5500 SPI-Ethernet) ─────────────
; The standalone open-hardware board (hardware/README.md). No internal EMAC on
; the S3 → Ethernet is the W5500 on SPI (ETH_PHY_W5500, v3-only). Pin map from
; hardware/lumigate.py:
;   W5500 SPI : SCLK=12 MOSI=11 MISO=13 CS=10 INT=14 RST=9   (host SPI3)
;   DMX       : DI/TX=17  RO/RX=18  DE+/RE=8 (RTS/enable)
;   LEDs (5)  : R=1  G=2  Y=6  B=7  W=15  (discrete GPIO, active-high → ledType 3)
;   Display J4: I2C SDA=4 SCL=5  (optional OLED; SPI panel pins set in /config)
; WiFi is the DEFAULT; the W5500 wired Ethernet is opt-in at runtime via /config
; (cfg.useEthernet). USE_ETH_SPI compiles the W5500 path; there is no USE_ETHERNET
; here (that would force Ethernet-only). Both WiFi + W5500 stacks ship in one build.
; The board has the CH340 auto-reset circuit, so it flashes without the BOOT dance.
[env:lumigate_v3]
board        = esp32-s3-devkitc-1
upload_speed = 921600
; v3 has the CH340 auto-reset circuit → clear the [env] --before=no_reset flag
upload_flags =
; Disable the ESP-IDF brownout detector. On arduino-esp32 v3 / IDF 5 the BOD is
; armed in the IDF startup (do_core_init → esp_brownout_init) BEFORE setup() runs,
; so the runtime RTC_CNTL_BROWN_OUT_REG write in setup() is too late on the S3 —
; the board boot-looped ("E BOD: Brownout detector was triggered", RTC_SW_SYS_RST).
; Turning it off at the sdkconfig level keeps it from ever arming. NOTE: this makes
; pioarduino rebuild the Arduino core from source (longer first build).
custom_sdkconfig =
    CONFIG_ESP_BROWNOUT_DET=n
build_flags  =
    ${env.build_flags}
    -DUSE_ETH_SPI
    -DETH_W5500_SCK=12
    -DETH_W5500_MOSI=11
    -DETH_W5500_MISO=13
    -DETH_W5500_CS=10
    -DETH_W5500_IRQ=14
    -DETH_W5500_RST=9
    -DDEF_DMX_TX_PIN=17
    -DDEF_DMX_RX_PIN=18
    -DDEF_DMX_RTS_PIN=8
    -DDEF_LED_TYPE=3
    -DDEF_LED_R=1
    -DDEF_LED_G=2
    -DDEF_LED_Y=6
    -DDEF_LED_B=7
    -DDEF_LED_W=15
    -DDEF_DISP_SDA=4
    -DDEF_DISP_SCL=5

; ── Arduino OTA (after first USB flash) ─────────────────────────────────────
; upload_protocol = espota
; upload_port     = dmx-gateway.local
; upload_flags    = --auth=dmxota
