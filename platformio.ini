; Art-Net → DMX Gateway für ESP32
; PlatformIO-Projekt
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Serieller Monitor
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Upload — board has no reliable auto-reset; enter boot mode manually first:
;   unplug USB → hold BOOT → plug USB in → release BOOT → then upload
upload_port    = COM3
upload_speed   = 460800
upload_flags   = --before=no_reset

; Pre-build: generate C headers from pages/ and assets/
extra_scripts = extra_scripts.py

; Libraries (PlatformIO-Registry)
lib_deps =
    someweisguy/esp_dmx @ ^4.1.0
    rstephan/ArtnetWifi  @ ^1.5.0
    tzapu/WiFiManager    @ ^2.0.17
    links2004/WebSockets @ ^2.4.0

; Partition: default ist groß genug (kein huge_app nötig)
board_build.partitions = min_spiffs.csv

; OTA-Upload (nach erstem Flash via USB)
; upload_protocol = espota
; upload_port     = dmx-gateway.local
; upload_flags    = --auth=dmxota
