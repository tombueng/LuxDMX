; LumiGate — Art-Net / sACN → DMX Gateway
; Supports ESP32 (original), ESP32-S3, and WT32-ETH01 (Ethernet)

; ── Shared settings ─────────────────────────────────────────────────────────
[env]
platform  = espressif32
framework = arduino

monitor_speed   = 115200
monitor_filters = esp32_exception_decoder

; Upload — boards without reliable auto-reset: hold BOOT while plugging USB
upload_port  = COM3
upload_flags = --before=no_reset

extra_scripts = extra_scripts.py

lib_deps =
    someweisguy/esp_dmx @ ^4.1.0
    rstephan/ArtnetWifi  @ ^1.5.0
    tzapu/WiFiManager    @ ^2.0.17
    adafruit/Adafruit NeoPixel @ ^1.12.3
    adafruit/Adafruit GFX Library @ ^1.11.11
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit SH110X @ ^2.1.12
    adafruit/Adafruit SSD1351 library @ ^1.3.2
    https://github.com/ESP32Async/AsyncTCP.git
    https://github.com/ESP32Async/ESPAsyncWebServer.git

board_build.partitions = min_spiffs.csv

; AsyncTCP hardening — larger task stack + queue so the web/WebSocket server
; never starves or overflows under sustained connection churn (it must stay
; reachable on stage). Pin it to core 1 alongside loop, away from the WiFi
; stack on core 0.
build_flags =
    -DCONFIG_ASYNC_TCP_STACK_SIZE=16384
    -DCONFIG_ASYNC_TCP_QUEUE_SIZE=128
    -DCONFIG_ASYNC_TCP_RUNNING_CORE=1
    -DCONFIG_ASYNC_TCP_PRIORITY=10

; ── ESP32 (original / WROOM-32 / WROVER) ────────────────────────────────────
; Default LED: GPIO2 plain, type 1 (plain GPIO active-high)
[env:esp32dev]
board        = esp32dev
upload_speed = 460800
build_flags  = ${env.build_flags} -DDEF_LED_PIN=2 -DDEF_LED_TYPE=1 -DDEF_DISP_SDA=21 -DDEF_DISP_SCL=22

; ── ESP32-S3 (DevKitC-1) ────────────────────────────────────────────────────
; DevKitC-1 built-in LED: GPIO48 WS2812 RGB, type 2
; Other S3 boards (FeatherS3, XIAO): plain LED on GPIO21 — change DEF_LED_PIN
[env:esp32s3dev]
board        = esp32-s3-devkitc-1
upload_speed = 921600
build_flags  = ${env.build_flags} -DDEF_LED_PIN=48 -DDEF_LED_TYPE=2 -DDEF_DISP_SDA=8 -DDEF_DISP_SCL=9

; ── WT32-ETH01 (Ethernet, no WiFi config portal) ────────────────────────────
; LAN8720 PHY on RMII — GPIO16=PHY power, GPIO0=CLK, GPIO18=MDIO, GPIO23=MDC
; DMX moved to GPIO4(TX)/GPIO5(RX) because GPIO16 is taken by LAN8720
[env:wt32eth01]
board        = wt32-eth01
upload_speed = 460800
build_flags  =
    ${env.build_flags}
    -DDEF_LED_PIN=2
    -DDEF_LED_TYPE=1
    -DDEF_DMX_TX_PIN=4
    -DDEF_DMX_RX_PIN=5
    -DDEF_DISP_SDA=14
    -DDEF_DISP_SCL=15
    -DUSE_ETHERNET

; ── Wokwi simulation (ESP32-S3, matches v3 hardware) ────────────────────────
; SIM_WIFI joins Wokwi's open "Wokwi-GUEST" AP directly, bypassing the
; WiFiManager config portal (unreachable from the simulator host).
; Build with:  pio run -e wokwi   then launch the Wokwi VS Code extension.
[env:wokwi]
board        = esp32-s3-devkitc-1
upload_speed = 921600
build_flags  = ${env.build_flags} -DDEF_LED_PIN=48 -DDEF_LED_TYPE=2 -DSIM_WIFI -DSIM_ARTNET -DDEF_DISP_TYPE=1 -DDEF_DISP_SDA=8 -DDEF_DISP_SCL=9

; ── Arduino OTA (after first USB flash) ─────────────────────────────────────
; upload_protocol = espota
; upload_port     = dmx-gateway.local
; upload_flags    = --auth=dmxota
